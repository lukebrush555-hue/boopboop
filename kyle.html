<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>🖕</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
    }
    .center {
      height: 100%;
      display: grid;
      place-items: center;
    }
    .emoji {
      font-size: min(70vw, 70vh);
      line-height: 1;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="emoji" aria-label="middle finger">🖕</div>
  </div>
</body>
</html>
